<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ตรวจสอบคะแนนนักเรียน</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    .card {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #125aa0;
    }
    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
    .error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <h3>🔍 ตรวจสอบคะแนน</h3>
    <input type="text" id="studentId" placeholder="กรอกรหัสประจำตัวนักเรียน">
    <button onclick="checkScore()">ดูคะแนน</button>

    <div id="result"></div>
    <div id="error" class="error"></div>
  </div>

  <script>
    function checkScore() {
      const id = document.getElementById('studentId').value.trim();
      document.getElementById('error').innerHTML = '';
      document.getElementById('result').innerHTML = '';

      if (!id) {
        document.getElementById('error').innerHTML = 'กรุณากรอกรหัสประจำตัว';
        return;
      }

      google.script.run.withSuccessHandler(showResult)
        .getStudentScore(id);
    }

    function showResult(data) {
      if (!data) {
        document.getElementById('error').innerHTML = 'ไม่พบข้อมูลนักเรียน';
        return;
      }

      document.getElementById('result').innerHTML = `
        <table>
          <tr><td><b>รหัส</b></td><td>${data.id}</td></tr>
          <tr><td><b>ชื่อ</b></td><td>${data.name}</td></tr>
          <tr><td><b>คะแนนเก็บ</b></td><td>${data.keep}</td></tr>
          <tr><td><b>กลางภาค</b></td><td>${data.mid}</td></tr>
          <tr><td><b>ปลายภาค</b></td><td>${data.final}</td></tr>
          <tr><td><b>รวม</b></td><td><b>${data.total}</b></td></tr>
        </table>
      `;
    }
  </script>
</body>
</html>
